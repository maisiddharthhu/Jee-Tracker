<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JEE Tracker">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <title>JEE Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1e2d40;
            --blue: #3b82f6;
            --blue-dim: rgba(59,130,246,0.15);
            --blue-border: rgba(59,130,246,0.3);
            --text: #e2e8f0;
            --muted: #64748b;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--blue-border);
            flex-shrink: 0;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(90deg, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .clock-mini {
            font-size: 22px;
            font-weight: 700;
            color: var(--blue);
            letter-spacing: 2px;
        }

        .date-mini {
            font-size: 10px;
            color: var(--muted);
            text-align: right;
            margin-top: 1px;
        }

        /* CURRENT ACTIVITY */
        .now-card {
            margin: 10px 12px;
            background: linear-gradient(135deg, #0c2340 0%, #0d3460 100%);
            border: 1px solid var(--blue-border);
            border-radius: 12px;
            padding: 12px 14px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .now-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .now-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: #60a5fa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .now-name {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }

        .now-detail {
            font-size: 11px;
            color: #93c5fd;
        }

        .now-time {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #60a5fa;
            text-align: right;
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 8px;
            margin: 0 12px 10px;
            flex-shrink: 0;
        }

        .stat {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--blue-border);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--blue);
        }

        .stat-label {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 6px;
            padding: 0 12px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 9px 6px;
            background: var(--surface);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tab.active {
            background: var(--blue-dim);
            border-color: var(--blue);
            color: #93c5fd;
        }

        /* SCROLL LIST */
        .list-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
            -webkit-overflow-scrolling: touch;
        }

        .list-wrap::-webkit-scrollbar { display: none; }

        .item {
            background: var(--surface);
            border-left: 3px solid var(--blue);
            border-radius: 0 8px 8px 0;
            padding: 10px 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s;
            active: none;
        }

        .item:active { transform: scale(0.98); opacity: 0.8; }

        .item.done {
            border-left-color: var(--muted);
            opacity: 0.4;
        }

        .item.done .item-name {
            text-decoration: line-through;
            color: var(--muted);
        }

        .item.current-item {
            border-left-color: #10b981;
            background: rgba(16,185,129,0.08);
        }

        .item-time {
            font-size: 10px;
            color: #60a5fa;
            margin-bottom: 3px;
        }

        .item-name {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }

        .item-detail {
            font-size: 10px;
            color: var(--muted);
        }

        /* BOTTOM BAR */
        .bottombar {
            padding: 8px 12px;
            border-top: 1px solid var(--blue-border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-reset {
            flex: 1;
            padding: 11px;
            background: var(--surface);
            border: 1px solid var(--blue-border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:active { opacity: 0.7; }

        .motivate {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            padding: 6px 0 4px;
            flex-shrink: 0;
        }

        /* INSTALL BANNER */
        .install-banner {
            display: none;
            margin: 0 12px 8px;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.4);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 11px;
            color: #6ee7b7;
            cursor: pointer;
        }

        .install-banner.show { display: block; }

        .toast {
            position: fixed;
            bottom: calc(80px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #10b981;
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <div class="logo">🎓 JEE</div>
        <div>
            <div class="clock-mini" id="time">00:00</div>
            <div class="date-mini" id="date">-</div>
        </div>
    </div>

    <div class="now-card" id="nowCard">
        <div class="now-label">▶ RIGHT NOW</div>
        <div class="now-name" id="nowName">Loading...</div>
        <div class="now-detail" id="nowDetail">-</div>
        <div class="now-time" id="nowTime">-</div>
    </div>

    <div class="stats">
        <div class="stat"><div class="stat-num" id="done">0</div><div class="stat-label">Done</div></div>
        <div class="stat"><div class="stat-num" id="total">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" id="percent">0%</div><div class="stat-label">Done</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="weekday">📚 Weekday</button>
        <button class="tab" data-tab="leave">⭐ Leave</button>
        <button class="tab" data-tab="weekend">🏃 Weekend</button>
    </div>

    <div id="installBanner" class="install-banner">
        📲 Tap to install JEE Tracker as an app on your phone!
    </div>

    <div class="list-wrap" id="list"></div>

    <div class="motivate">💪 Consistency beats perfection. You've got this!</div>

    <div class="bottombar">
        <button class="btn-reset" id="resetBtn">↻ Reset Day</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const schedules = {
    weekday: [
        {t:'05:00',d:'30m',a:'Wake up + Exercise',x:'Light jog/yoga'},
        {t:'05:30',d:'45m',a:'Freshen up + Breakfast',x:'Quick meal'},
        {t:'06:15',d:'45m',a:'Self-study (Revision)',x:'Revise yesterday'},
        {t:'07:00',d:'1h',a:'Travel to school',x:'Read JEE Q'},
        {t:'08:00',d:'5h',a:'SCHOOL',x:'Focus on classes'},
        {t:'13:00',d:'1h',a:'Lunch + Rest',x:'Eat & nap 15m'},
        {t:'14:00',d:'1h45m',a:'Self-study (New Topics)',x:'Study before class'},
        {t:'15:45',d:'15m',a:'Light snack + Travel',x:'Energy boost'},
        {t:'16:00',d:'4.5h',a:'LAKSHYA CLASSES',x:'Take notes'},
        {t:'20:30',d:'30m',a:'Dinner',x:'Eat well'},
        {t:'21:00',d:'1h',a:'Solve class problems',x:'10-15 problems'},
        {t:'22:00',d:'30m',a:'Mistake notebook',x:'Write errors'},
        {t:'22:30',d:'30m',a:'Prepare tomorrow',x:'Check topic'},
        {t:'23:00',d:'-',a:'SLEEP',x:'Must sleep by 11 PM'}
    ],
    leave: [
        {t:'05:00',d:'45m',a:'Wake up + Exercise',x:'Longer yoga/jog'},
        {t:'05:45',d:'45m',a:'Freshen up + Breakfast',x:'Good breakfast'},
        {t:'06:30',d:'1.5h',a:'Deep Self-Study',x:'Weakest chapter focus'},
        {t:'08:00',d:'1h',a:'Solve problems',x:'20-30 problems'},
        {t:'09:00',d:'1h',a:'Revision + Formulas',x:'Write formulas'},
        {t:'10:00',d:'1.5h',a:'FULL MOCK TEST',x:'JEE Main mock'},
        {t:'11:30',d:'1h',a:'Lunch + Rest',x:'Eat & recharge'},
        {t:'12:30',d:'1.5h',a:'Analyze mock',x:'Review answers'},
        {t:'14:00',d:'1.5h',a:'Solve similar problems',x:'Practice weak areas'},
        {t:'15:30',d:'30m',a:'Break + Snack',x:'Rest & eat'},
        {t:'16:00',d:'4.5h',a:'LAKSHYA CLASSES',x:'Attend coaching'},
        {t:'20:30',d:'30m',a:'Dinner',x:'Eat well'},
        {t:'21:00',d:'1h',a:'Solve class problems',x:'Today class'},
        {t:'22:00',d:'1h',a:'Mistake notebook',x:'Write & prepare'},
        {t:'23:00',d:'-',a:'SLEEP',x:'Sleep'}
    ],
    weekend: [
        {t:'05:00',d:'1h',a:'Exercise + Breakfast',x:'Good exercise'},
        {t:'06:00',d:'2h',a:'Solve 30 JEE Q',x:'Hard questions'},
        {t:'08:00',d:'1.5h',a:'Concept revision',x:'Theory & formulas'},
        {t:'09:30',d:'1h',a:'Break',x:'Rest & snack'},
        {t:'10:30',d:'2h',a:'Speed drills',x:'Same-type problems'},
        {t:'12:30',d:'1.5h',a:'Lunch + Rest',x:'Eat & nap 30m'},
        {t:'14:00',d:'2h',a:'FULL MOCK TEST',x:'JEE Main mock'},
        {t:'16:00',d:'1h',a:'Analyze mock',x:'Review mistakes'},
        {t:'17:00',d:'3h',a:'FREE TIME',x:'Movie/friends/sports'},
        {t:'20:00',d:'1h',a:'Dinner + Rest',x:'Eat & relax'},
        {t:'21:00',d:'2h',a:'Solve similar problems',x:'Weak topics'},
        {t:'23:00',d:'-',a:'SLEEP',x:'Sleep'}
    ]
};

const STORAGE_KEY = 'jee_completed_v2';
let currentTab = 'weekday';
let completed = {};
let deferredPrompt = null;

// Load saved state
function loadState() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            const today = new Date().toDateString();
            if (data.date === today) {
                completed = data.completed || {};
                currentTab = data.tab || 'weekday';
            }
        }
    } catch(e) {}
}

function saveState() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            date: new Date().toDateString(),
            completed,
            tab: currentTab
        }));
    } catch(e) {}
}

function toMins(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

function getCurrentIdx() {
    const now = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();
    const sched = schedules[currentTab];
    for (let i = 0; i < sched.length - 1; i++) {
        if (mins >= toMins(sched[i].t) && mins < toMins(sched[i+1].t)) return i;
    }
    return 0;
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('time').textContent = h + ':' + m;
    document.getElementById('date').textContent = now.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'});
}

function render() {
    updateClock();
    const sched = schedules[currentTab];
    const currIdx = getCurrentIdx();
    const curr = sched[currIdx];

    // Now card
    document.getElementById('nowName').textContent = curr.a;
    document.getElementById('nowDetail').textContent = curr.x;
    document.getElementById('nowTime').textContent = curr.t + '\n' + curr.d;

    // List
    const list = document.getElementById('list');
    list.innerHTML = '';
    sched.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'item' + (completed[i] ? ' done' : '') + (i === currIdx ? ' current-item' : '');
        div.innerHTML = `
            <div class="item-time">${item.t} · ${item.d}${i === currIdx ? ' ◀ NOW' : ''}</div>
            <div class="item-name">${completed[i] ? '✓ ' : ''}${item.a}</div>
            <div class="item-detail">${item.x}</div>
        `;
        div.addEventListener('click', () => {
            completed[i] = !completed[i];
            saveState();
            if (completed[i]) showToast('✓ Marked done!');
            render();
        });
        list.appendChild(div);
    });

    // Auto scroll to current
    const items = list.querySelectorAll('.item');
    if (items[currIdx]) {
        setTimeout(() => items[currIdx].scrollIntoView({behavior:'smooth', block:'center'}), 100);
    }

    // Stats
    const d = Object.values(completed).filter(Boolean).length;
    const t = sched.length;
    document.getElementById('done').textContent = d;
    document.getElementById('total').textContent = t;
    document.getElementById('percent').textContent = Math.round(d/t*100) + '%';

    // Sync tab UI
    document.querySelectorAll('.tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === currentTab);
    });
}

// Tabs
document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', function() {
        currentTab = this.dataset.tab;
        completed = {};
        saveState();
        render();
    });
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
    completed = {};
    saveState();
    render();
    showToast('↻ Day reset!');
});

// PWA Install prompt
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
});

document.getElementById('installBanner').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
});

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Init
loadState();
render();
setInterval(() => { updateClock(); }, 30000);
</script>
</body>
</html>
